title: "Documentation Hub"
description: "Multi-project documentation generated by ESX Wiki"
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - wiki.json
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
    values:
      layout: default
